<html lang="nl">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vind een verdeler</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
  :root {
    --brand:     #333333;
    --accent:    #BA1B20;
    --accent2:   #BA1B20;
    --light:     #f0f0f0;
    --card:      #ffffff;
    --text:      #000000;
    --muted:     #555555;
    --border:    #dde3ec;
    --radius:    14px;
    --shadow:    0 4px 24px rgba(0,0,0,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--light);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .hero {
    background: #e8e8e8;
    padding: 48px 32px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      135deg,
      transparent,
      transparent 40px,
      rgba(0,0,0,.02) 40px,
      rgba(0,0,0,.02) 80px
    );
    pointer-events: none;
  }
  .hero-pill {
    display: inline-block;
    background: rgba(186,27,32,.12);
    color: #BA1B20;
    font-family: 'Poppins', sans-serif;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(1.9rem, 4vw, 2.8rem);
    font-weight: 800;
    color: #000000;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    color: #555555;
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Layout ── */
  .wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── Search card ── */
  .search-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }
  .search-card h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--brand);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-card h2::before {
    content: '';
    display: inline-block;
    width: 4px; height: 18px;
    background: var(--accent);
    border-radius: 4px;
  }

  .search-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 160px;
  }
  .field label {
    font-size: .78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .field input, .field select {
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 11px 14px;
    font-family: 'Poppins', sans-serif;
    font-size: .95rem;
    color: var(--text);
    background: var(--light);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(26,60,94,.12);
    background: #fff;
  }

  .btn-search {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 9px;
    padding: 12px 26px;
    font-family: 'Poppins', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s, transform .1s, box-shadow .2s;
    white-space: nowrap;
    box-shadow: 0 3px 12px rgba(186,27,32,.3);
    align-self: flex-end;
  }
  .btn-search:hover { background: #c94010; transform: translateY(-1px); box-shadow: 0 5px 18px rgba(186,27,32,.35); }
  .btn-search:active { transform: translateY(0); }
  .btn-search:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

  /* ── Status bar ── */
  #status-bar {
    font-size: .88rem;
    color: var(--muted);
    padding: 10px 0 0;
    min-height: 26px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #status-bar.found { color: #1a7a4a; }
  #status-bar.error { color: #c0392b; }
  .spinner {
    width: 15px; height: 15px;
    border: 2px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .spinner.active { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Map + results layout ── */
  .map-results-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 820px) {
    .map-results-grid { grid-template-columns: 1fr; }
    #results-panel { order: 2; }
    #map-wrap { order: 1; }
  }

  /* ── Map ── */
  #map-wrap {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
  }
  #map { height: 520px; width: 100%; }

  /* ── Results panel ── */
  #results-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .result-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color .18s, box-shadow .18s, transform .15s;
    position: relative;
    overflow: visible;
    height: auto !important;
    min-height: unset !important;
    max-height: unset !important;
    flex-shrink: 0;
    display: block !important;
    box-sizing: border-box;
  }
  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
    border-radius: 4px 0 0 4px;
    transform: scaleY(0);
    transition: transform .2s;
  }
  .result-card:hover, .result-card.active {
    border-color: var(--brand);
    box-shadow: 0 4px 18px rgba(26,60,94,.14);
    transform: translateX(2px);
  }
  .result-card:hover::before, .result-card.active::before { transform: scaleY(1); }

  .rc-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: .98rem;
    color: var(--brand);
    margin-bottom: 4px;
    display: block !important;
    visibility: visible !important;
    line-height: 1.3;
  }
  .rc-addr {
    font-size: .83rem;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
    display: block !important;
    visibility: visible !important;
  }
  .rc-dist {
    display: inline-flex !important;
    align-items: center;
    gap: 4px;
    background: rgba(26,60,94,.07);
    color: var(--brand);
    font-size: .78rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    visibility: visible !important;
    margin-bottom: 6px;
  }
  .rc-phone {
    font-size: .82rem;
    color: var(--muted);
    margin-top: 5px;
    display: block !important;
    visibility: visible !important;
  }
  .rc-phone a { color: var(--accent); text-decoration: none; }
  .rc-phone a:hover { text-decoration: underline; }
  .rc-route {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    background: var(--accent);
    color: #fff !important;
    font-family: 'Poppins', sans-serif;
    font-size: .78rem;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 7px;
    text-decoration: none !important;
    transition: background .2s, transform .1s;
  }
  .rc-route:hover { background: #8f1215; transform: translateY(-1px); }
  .popup-route {
    display: inline-block;
    margin-top: 8px;
    background: var(--accent);
    color: #fff !important;
    font-size: .80rem;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 7px;
    text-decoration: none !important;
  }
  .popup-route:hover { background: #8f1215; }

  .no-results {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px dashed var(--border);
    padding: 36px 20px;
    text-align: center;
    color: var(--muted);
  }
  .no-results svg { margin-bottom: 10px; opacity: .4; }
  .no-results p { font-size: .9rem; }

  /* ── Leaflet overrides ── */
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    box-shadow: 0 6px 24px rgba(26,60,94,.18) !important;
    font-family: 'DM Sans', sans-serif !important;
    border: 1.5px solid var(--border) !important;
  }
  .leaflet-popup-content { margin: 14px 16px !important; }
  .popup-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    color: var(--brand);
    font-size: .98rem;
    margin-bottom: 4px;
  }
  .popup-addr { font-size: .82rem; color: var(--muted); }
  .popup-phone { font-size: .82rem; color: var(--accent); margin-top: 4px; }

  /* radius circle */
  .leaflet-interactive.radius-circle {
    fill: rgba(26,60,94,.06);
    stroke: var(--brand);
    stroke-dasharray: 8 5;
    stroke-width: 1.5;
  }
</style>
</head>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-pill">Verdelers netwerk</div>
  <h1>Vind een verdeler<br/><span>bij u in de buurt</span></h1>
  <p>Voer uw postcode in en ontdek alle officiële verdelers binnen uw gewenste straal.</p>
</div>

<!-- ── MAIN ── -->
<div class="wrapper">

  <!-- Search -->
  <div class="search-card">
    <h2>Zoek op postcode</h2>
    <div class="search-row">
      <div class="field">
        <label>Postcode</label>
        <input type="text" id="postal-input" placeholder="bv. 9000" maxlength="4" inputmode="numeric"/>
      </div>
      <div class="field" style="max-width:180px">
        <label>Zoekstraal</label>
        <select id="radius-select">
          <option value="25">25 km</option>
          <option value="50" selected>50 km</option>
        </select>
      </div>
      <button class="btn-search" id="search-btn" onclick="doSearch()">Zoeken →</button>
    </div>
    <div id="status-bar">
      <span class="spinner" id="spinner"></span>
      <span id="status-text">Voer een postcode in om te beginnen.</span>
    </div>
  </div>

  <!-- Map + results -->
  <div class="map-results-grid">
    <div id="map-wrap"><div id="map"></div></div>
    <div id="results-panel">
      <div class="no-results">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <p>Geen verdelers weergegeven.<br/>Voer een postcode in om te zoeken.</p>
      </div>
    </div>
  </div>
</div>

// Custom icon
function makeIcon(active=false) {
  return L.divIcon({
    className: '',
    iconSize: [30, 38],
    iconAnchor: [15, 38],
    popupAnchor: [0, -38],
    html: `<svg width="30" height="38" viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C6.716 0 0 6.716 0 15c0 10.5 15 23 15 23s15-12.5 15-23C30 6.716 23.284 0 15 0z"
        fill="${active ? '#e8531a' : '#1a3c5e'}" />
      <circle cx="15" cy="15" r="6" fill="white"/>
    </svg>`
  });
}

let allMarkers = [];
let circleLayer = null;
let userMarker = null;
let distributors = [];
let lastFound = [];

// ═══════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════
async function loadData() {
  if (DATA_URL && DATA_URL.trim() !== '') {
    try {
      const text = await fetch(DATA_URL).then(r => r.text());
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      distributors = parsed.data.map(r => ({
        name:    (r.name    || r.Name    || '').trim(),
        address: (r.address || r.Address || '').trim(),
        city:    (r.city    || r.City    || '').trim(),
        postal:  (r.postal  || r.Postal  || r.postcode || '').trim(),
        phone:   (r.phone   || r.Phone   || '').trim(),
        lat:     parseFloat(r.lat || r.Lat || 0),
        lng:     parseFloat(r.lng || r.Lng || r.lon || r.Lon || 0),
      })).filter(d => d.lat && d.lng);
      console.log(`Loaded ${distributors.length} distributors from remote CSV.`);
    } catch (e) {
      console.warn('Could not load remote data, falling back to sample.', e);
      distributors = SAMPLE_DISTRIBUTORS;
    }
  } else {
    distributors = SAMPLE_DISTRIBUTORS;
  }

  // Add all markers to map (dimmed initially)
  distributors.forEach(d => {
    const marker = L.marker([d.lat, d.lng], { icon: makeIcon(false) })
      .addTo(map)
      .bindPopup(`<div class="popup-name">${d.name}</div>
        <div class="popup-addr">${d.address}, ${d.postal} ${d.city}</div>
        ${d.phone ? `<div class="popup-phone">📞 <a href="tel:${d.phone.replace(/\s/g,'')}" style="color:#BA1B20;text-decoration:none">${d.phone}</a></div>` : ''}
        ${d.email ? `<div class="popup-phone">✉️ <a href="mailto:${d.email}" style="color:#BA1B20;text-decoration:none">${d.email}</a></div>` : ''}
        <a class="popup-route" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d.address+' '+d.postal+' '+d.city)}" target="_blank">🗺️ Route berekenen</a>`);
    marker._distData = d;
    marker._active = false;
    allMarkers.push(marker);
  });
}

// ═══════════════════════════════════════════════════════
//  HAVERSINE
// ═══════════════════════════════════════════════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
async function doSearch() {
  const postalRaw = document.getElementById('postal-input').value.trim();
  const radiusKm  = parseInt(document.getElementById('radius-select').value);
  const statusEl  = document.getElementById('status-text');
  const spinner   = document.getElementById('spinner');
  const btn       = document.getElementById('search-btn');

  if (!/^\d{4}$/.test(postalRaw)) {
    setStatus('Voer een geldige Belgische postcode in (4 cijfers).', 'error');
    return;
  }

  spinner.classList.add('active');
  btn.disabled = true;
  setStatus('Postcode opzoeken…', '');

  // look up coordinates
  const coords = POSTAL_COORDS[postalRaw];
  let centerLat, centerLng;

  if (coords) {
    centerLat = coords.lat;
    centerLng = coords.lng;
  } else {
    // fallback: geocode via nominatim
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${postalRaw}&country=BE&format=json&limit=1`);
      const json = await res.json();
      if (!json.length) throw new Error('not found');
      centerLat = parseFloat(json[0].lat);
      centerLng = parseFloat(json[0].lon);
    } catch {
      spinner.classList.remove('active');
      btn.disabled = false;
      setStatus(`Postcode ${postalRaw} niet gevonden. Controleer en probeer opnieuw.`, 'error');
      return;
    }
  }

  // Filter within radius
  const found = distributors
    .map(d => ({ ...d, distance: haversine(centerLat, centerLng, d.lat, d.lng) }))
    .filter(d => d.distance <= radiusKm)
    .sort((a,b) => a.distance - b.distance);

  // Update map
  if (circleLayer) map.removeLayer(circleLayer);
  if (userMarker)  map.removeLayer(userMarker);

  circleLayer = L.circle([centerLat, centerLng], {
    radius: radiusKm * 1000,
    className: 'radius-circle',
    fillColor: '#1a3c5e',
    fillOpacity: 0.06,
    color: '#1a3c5e',
    weight: 1.5,
    dashArray: '8,5',
  }).addTo(map);

  userMarker = L.marker([centerLat, centerLng], {
    icon: L.divIcon({
      className: '',
      iconSize: [20, 20],
      iconAnchor: [10, 10],
      html: `<div style="width:20px;height:20px;background:#e8531a;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)"></div>`
    })
  }).addTo(map).bindPopup(`<b>Uw locatie</b><br/>Postcode ${postalRaw}`);

  // Restyle all markers
  allMarkers.forEach(m => {
    const inRadius = found.some(f => f.lat === m._distData.lat && f.lng === m._distData.lng);
    m.setIcon(makeIcon(inRadius));
    m.setOpacity(inRadius ? 1 : 0.25);
    m._active = inRadius;
  });

  // Fit bounds
  const bounds = circleLayer.getBounds();
  map.fitBounds(bounds, { padding: [30, 30] });

  // Render results panel
  lastFound = found;
  renderResults(found, radiusKm);

  spinner.classList.remove('active');
  btn.disabled = false;

  if (found.length > 0) {
    setStatus(`${found.length} verdeler${found.length>1?'s':''} gevonden binnen ${radiusKm} km.`, 'found');
  } else {
    setStatus(`Geen verdelers gevonden binnen ${radiusKm} km van postcode ${postalRaw}.`, 'error');
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.className = type ? `status-bar ${type}` : '';
  document.getElementById('status-text').textContent = msg;
}

function renderResults(found, radiusKm) {
  const panel = document.getElementById('results-panel');

  if (!found.length) {
    panel.innerHTML = `<div class="no-results">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <p>Geen verdelers gevonden<br/>binnen ${radiusKm} km.</p>
    </div>`;
    return;
  }

  panel.innerHTML = found.map((d, i) => `
    <div class="result-card" id="rc-${i}" data-idx="${i}">
      <div class="rc-name">${d.name}</div>
      <div class="rc-addr">${d.address}<br/>${d.postal} ${d.city}</div>
      <span class="rc-dist">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${d.distance.toFixed(1)} km
      </span>
      ${d.phone ? `<div class="rc-phone">📞 <a href="tel:${d.phone.replace(/\s/g,'')}">${d.phone}</a></div>` : ''}
      ${d.email ? `<div class="rc-phone">✉️ <a href="mailto:${d.email}">${d.email}</a></div>` : ''}
      <a class="rc-route" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d.address+' '+d.postal+' '+d.city)}" target="_blank" onclick="event.stopPropagation()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M13 6l6 6-6 6"/></svg>
        Route berekenen
      </a>
    </div>
  `).join('');
}

// Event delegation — one listener on the panel, works for all cards
document.getElementById('results-panel').addEventListener('click', function(e) {
  const card = e.target.closest('.result-card');
  if (!card) return;
  // don't intercept phone link clicks
  if (e.target.tagName === 'A') return;
  const idx = parseInt(card.dataset.idx);
  const d = lastFound[idx];
  if (!d) return;

  map.setView([d.lat, d.lng], 14, { animate: true });
  const marker = allMarkers.find(m => m._distData.lat === d.lat && m._distData.lng === d.lng);
  if (marker) marker.openPopup();

  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

// ── Enter key support ──
document.getElementById('postal-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ── Init ──
loadData();
</script>
</body>
</html>
